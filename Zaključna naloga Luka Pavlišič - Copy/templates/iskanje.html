<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pravi avto</title>
    <style>
        body {
            background-color: #06066a;
            color: #FFFFFF;
        }
        .zavnos {
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
        }
        .isci {
            margin-top: 20px;
            width: 200px;
            background-color: #00b3ff;
            color: #06066a;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .isci:hover {
            background-color: #00bfff;
            box-shadow: 0 4px 12px rgba(0, 179, 255, 0.4);
            transform: scale(1.05);
        }
        .izbira {
            width: 80%;
            box-sizing: border-box;
            border-spacing: 10px 0;
            table-layout: auto;
            margin-left: auto;
            margin-right: auto;
        }
        
        .izbira td:first-child {
            white-space: nowrap;
            width: 1%;
        }
        
        .izbira td:last-child {
            width: 99%;
        }
        .avti-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding-left: 40px;
            padding-right: 40px;
            padding-top: 30px;
            max-width: 1600px;
            margin: 0 auto;
            background-color: #040449;         
            border-radius: 20px;
        }

        .avti-grid a {
            text-decoration: none;
            color: inherit;
        }

        .avti-grid > a > div {
            background-color: #2C2C3E;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .avti-grid > a > div:hover {
            transform: translateY(-8px);
            box-shadow: 0 4px 12px rgba(0, 179, 255, 0.4);
            transform: scale(1.05);
        }

        .avti-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .avti-grid > a > div > div:last-child {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .avti-grid h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: #00b3ff;
        }

        .avti-grid > a > div > div > div:first-of-type {
            font-size: 16px;
            font-weight: bold;
            color: #00bfff;
            margin-bottom: 12px;
        }

        .avti-grid > a > div > div > div:last-child > div {
            font-size: 13px;
            color: #ffffff;
            margin-bottom: 4px;
        }


        input, select {
            box-sizing: border-box;
            width: 800px;
            height: 40px;
            padding: 8px 12px;
            border: 2px solid #00b3ff;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #06066a;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00bfff;
            box-shadow: 0 0 8px rgba(0, 179, 255, 0.5);
            background-color: white;
        }

        input::placeholder {
            color: #999;
        }

        .logo {
            margin: auto;
            margin-bottom: 20px;
            height: 200px;
            width: 800px;
            display: flex;
        }

        .zavnos {
            width: 30%;
            white-space: nowrap;
        }

        .izbira input,
        .izbira select {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
    
    <table class="izbira">
        <tr>
            <td class="zavnos">Budget (€):</td>
            <td><input type="number" id="budget" placeholder="Vnesi največjo ceno ali pusti prazno"></td>
        </tr>
        
        <tr>
            <td class="zavnos">Izgled:</td>
            <td><select id="izgled">
                <option value="">Vseeno</option>
                <option value="Športen">Športen</option>
                <option value="Luksuzen">Luksuzen</option>
                <option value="Klasičen">Klasičen</option>
                <option value="Mestni">Mestni</option>
                <option value="Navaden">Navaden</option>
            </select>
        </tr>
        
        <tr>
            <td class="zavnos">Menjalnik:</td>
            <td>
                <select id="menjalnik">
                <option value="">Vseeno</option>
                <option value="Avtomatski">Avtomatski</option>
                <option value="Ročni">Ročni</option>
                </select>
            </td>
        </tr>
        
        <tr>
            <td class="zavnos">Trg:</td>
            <td>
                <select id="trg">
                <option value="">Vseeno</option>
                <option value="Slovenski">Slovenski</option>
                <option value="Nemški">Nemški</option>
                </select>
            </td>
        </tr>

        <tr>
            <td class="zavnos">Gorivo:</td>
            <td>
                <select id="gorivo">
                <option value="">Vseeno</option>
                <option value="Bencin">Bencin</option>
                <option value="Diesel">Diesel</option>
                </select>
            </td>
        </tr>
        
        <tr>
            <td class="zavnos">Tip:</td>
            <td>
                <select id="tip">
                <option value="">Vseeno</option>
                <option value="Moderen">Moderen</option>
                <option value="Prostornejši">Prostornejši</option>
                <option value="Terenski">Terenski</option>
                <option value="Navaden">Navaden</option>
                </select>
            </td>
        </tr>
        
        
    </table>
    
    <div style="text-align: center;">
        <button type="button" class="isci" onclick="isciAvte()">Išči Avte</button>
    </div>

    <div id="results"></div>

    <script>
        // FUNKCIJA ZA ISKANJE - ZELO PREPROSTA
        function isciAvte() {
            // PREBERI KAJ UPORABNIK IŠČE
            var budget = document.getElementById("budget").value;
            var izgled = document.getElementById("izgled").value;
            var menjalnik = document.getElementById("menjalnik").value;
            var gorivo = document.getElementById("gorivo").value;
            var trg = document.getElementById("trg").value;
            var tip = document.getElementById("tip").value;
            
            // PRIKAŽI DA NALAGAMO
            var rezultati = document.getElementById("results");
            rezultati.innerHTML = '<div>Nalagam avte...</div>';
            
            // SESTAVI LINK DO PYTHON API
            var link = '/api/avti?';
            link = link + 'budget=' + budget + '&';
            link = link + 'izgled=' + izgled + '&';
            link = link + 'gorivo=' + gorivo + '&';
            link = link + 'menjalnik=' + menjalnik + '&';
            link = link + 'trg=' + trg + '&';
            link = link + 'tip=' + tip;
            
            // KLIČI PYTHON
            fetch(link)
                .then(function(odgovor) {
                    return odgovor.json();
                })
                .then(function(avti) {
                    prikaziAvte(avti);
                })
                .catch(function(napaka) {
                    rezultati.innerHTML = '<div>Prišlo je do napake.</div>';
                });
        }

        // FUNKCIJA ZA PRIKAZ AVTOV - ZELO PREPROSTA
        function prikaziAvte(avti) {
            // KJE BOMO PRIKAZALI AVTE
            var rezultati = document.getElementById("results");
            
            // ČE NI AVTOV
            if (avti.length === 0) {
                rezultati.innerHTML = '<div>Ni najdenih avtov. Poskusi druge filtre.</div>';
                return;
            }
            
            // ZAČNI HTML
            var html = '<div class="avti-grid">';;
            
            // POGLEJ VSE AVTE
            var i = 0;
            while (i < avti.length) {
                var avto = avti[i];
                
                // ZAČNI KARTICO ZA AVTO
                // UPORABI PRAVI ID AVTA
                var avto_id = avto.id;
                html = html + '<a href="/avto' + avto_id + '">';
                html = html + '<div>';
                
                // DODAJ SLIKO
                html = html + '<img src="/static/slike/' + avto.slika + '" alt="' + avto.znamka + '">';
                
                // ZAČNI VSEBINO
                html = html + '<div>';
                
                // DODAJ NASLOV
                html = html + '<h3>' + avto.znamka + ' ' + avto.model + '</h3>';
                
                // DODAJ CENO
                var cena_tekst = avto.cena.toLocaleString();
                html = html + '<div>' + cena_tekst + ' €</div>';
                
                // DODAJ PODATKE
                html = html + '<div>';
                html = html + '<div><strong>Izgled:</strong> ' + avto.izgled + '</div>';
                html = html + '<div><strong>Gorivo:</strong> ' + avto.gorivo + '</div>';
                html = html + '<div><strong>Menjalnik:</strong> ' + avto.menjalnik + '</div>';
                html = html + '<div><strong>Tip:</strong> ' + avto.tip + '</div>';
                html = html + '<div><strong>Trg:</strong> ' + avto.trg + '</div>';
                html = html + '</div>';
                
                // ZAPRI VSEBINO
                html = html + '</div>';
                
                // ZAPRI KARTICO
                html = html + '</div>';
                
                // ZAPRI LINK
                html = html + '</a>';
                
                // NASLEDNJI AVTO
                i = i + 1;
            }
            
            // ZAPRI HTML
            html = html + '</div>';
            
            // PRIKAŽI NA STRANI
            rezultati.innerHTML = html;
        }

        // KO SE STRAN NALOŽI, PRIKAŽI VSE AVTE
        window.onload = function() {
            isciAvte();
        };
    </script>
</body>
</html>
